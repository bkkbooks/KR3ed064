body:
  text: 世補齋不謝方小引疾病二字世每連稱然今人之所謂病於古但稱為疾必其疾之加甚始謂之病病可通言疾疾不可遽言病也子之所慎者疾疾者未至於病及子路請禱又欲使門人為臣則日子疾病左傳於魏顆輔氏之役述其父武子疾既而曰疾病又陳文子召無宇於萊亦曰無宇之母疾病此皆以病字別為一句病之為言困也謂疾至此困甚也故內經四氣調神論曰聖人不治已病治未病病已成而後藥之譬猶渴而掘井鬥而鑄兵不亦晚乎經蓋謂人於已疾之後未病之先即當早為之藥乃後人以疾為病認作服藥於未疾時反謂藥以治病未病何以藥為不知經言未病正言已疾疾而不治日以加甚儀禮既夕記疾病外內皆掃鄭注疾甚曰病鄭於喪大記首句義同並足取以證説文疾病也病疾加也兩義再證以周禮疾醫賈疏引漢書藝文志有病不治恆得中醫則謂藥不中病不如勿藥非謂既病而可弗藥也匯而觀之可見病甚而藥藥已無及未至於病即宜藥之此則內經未病之旨豈謂投藥於無疾之人哉夫病必使之去不可使之留內經最惡留病故曰百病之始生也必先於皮毛留而不去傳入於府廩於腸胃又曰風寒客於人病入舍於肺弗治病即傳而行之肝弗治肝傳之脾脾傳之腎腎傳之心滿十日法當死故又謂善治者治皮毛其次治肌膚治筋骨治六腑治五臟治五臟者半死半生也然則如經所云邪之新客未有定處推之則前引之則止時顧可留其病而弗使去乎醫以能治大病為上醫正以不使病大為能人之言曰不使病大則病家並不信內經十日以後事即此十日內不速去之病為之故病愈而不謝病愈之速而更不謝曲突徙薪者必無恩澤也雖然病而不愈必大惟其愈之能速而凡後此傳變皆消弭於無形所以有此人不及知而己獨知之之妙餘隻問其病之愈不愈遑計人之知不知哉今録諸方存之即名之曰不謝方云
