body:
  text: 不謝方一卷風寒溫散此即俗所稱小傷風也其冬月正傷寒須用桂麻青龍者不在此例切忌早用寒涼防風荊芥穗紫蘇葉姜半夏廣陳皮枳殼苦桔梗炙甘草加生薑去皮頭痛甚加藁本蔓荊子風熱涼散此即風溫之輕者凡羌獨柴前芎芷升葛隨證可加病與風寒無大異獨不得用桂麻防風荊芥蘇薄荷霜桑葉淡竹葉連翹生山梔廣橘紅枳殼桔梗炙草加連須蔥白頭風寒挾食甚者須用硝黃不在此例凡有感冒胃腸即不健運非必傷於食也防風荊芥建神麯焦穀麥芽萊菔子南楂炭桔梗蘇梗或加雞內金或加檳榔枳實酒客加葛花枳椇子風寒挾痰寒水為病水即痰也故有感冒每涉於痰甚則須用膽星竹瀝葶藶之屬防風荊芥半夏陳皮萊菔子白芥子蘇子江枳實竹茹雲茯苓炙草便溏蘇子易蘇梗風寒挾濕寒濕之病上甚為熱以上三證亦有因於風熱者無論何病有此三挾皆可檢用三方之藥羌活獨活防風蒼朮藿香廣木香川厚朴豬苓赤茯苓建澤瀉或加漢防己傷寒成溫寒一化熱便忌桂麻甚則須用膏黃大忌滋膩等藥及珠黃冰麝凡在溫熱病皆然葛根黃芩川黃連生山梔淡豆豉牛蒡子連翹赤勺丹皮桔梗生草或加蔥白頭冬溫冬月病熱即是冬溫不可用正傷寒之桂麻甚則亦有須用膏黃芩連者玉竹白薇生山梔赤芍丹皮桑白皮知母白杏仁桔梗生草用臘雪水煎春溫春月病熱即是春溫宜忌與冬溫同以上二證即傷寒論中之溫病也柴胡葛根黃芩黃連薄荷桑葉連翹生山梔赤芍丹皮生草肝腎熱加羚羊角龍膽草黃柏知母風溫春為風風溫在春為多凡目赤頤腫牙痛喉痧皆是其微者但為風熱防風川芎左秦艽薄荷桑葉淡竹葉連翹金銀花射干馬勃桔梗生草咳加杏仁橘紅濕溫此證多見於首夏初秋甚者用蒼朮白虎湯凡一人獨病之溫通不得謂為瘟疫白芷製蒼朮厚朴薏仁川黃柏川楝子豬苓赤苓澤瀉或用茵陳蒿或加牛膝車前川萆薢夏暑暑即熱也亦曰中暍其別有乘涼飲冷而病者為寒霍亂須用理中四逆及諸辛熱方者不在此例香薷扁豆衣厚朴黃連蘇葉藿香青蒿宣木瓜赤苓澤瀉酌加諸六一散熱甚不禁西瓜秋燥此證最多咳逆不用桂麻甚者須用石膏其陽明燥金重侯不在此例薄荷桑葉杏仁川貝母牛蒡子栝樓根實桔梗生草加枇杷葉喉痛加射干馬勃濕痰隨證可加膽星枳實竹瀝之屬其土弱木強可用香砂六君歸芍六君者不在此例半夏陳皮茯苓枳殼竹茹萊菔子白芥子厚朴蘇梗藿梗或加砂仁豆蔻嘔加生薑燥痰痰在脾為濕在肺為燥治脾宜燥治肺宜潤其痰一也而經病不同旋覆花杏仁橘紅知母貝母栝蔞根紫菀款冬花枇杷葉冬瓜子或加馬兜鈴海蛤殼青黛海浮石寒飲此為寒水之病金匱洋言之法宜溫中甚者須用小青龍理中四逆真武諸方半夏陳皮茯苓乾薑製附子枳實白朮炙草氣滯甚加厚朴胃寒甚加公丁香吳茱萸草果益智仁結胸此證詳見傷寒論與痞相似不痛為痞痛者結胸有大小之別治不外和胃解結開通上下栝蔞實枳實厚朴黃芩黃連乾薑半夏陳皮茯苓炙草寒實去芩連加薤白水結胸加附子痧疹二證升散清涼宜合用之不可偏廢甚者須用石膏切忌犀角升麻葛根柴胡黃芩赤芍元參金銀花連翹牛蒡子生山梔生草或加殭蠶蟬蛻西河柳瘧此證往來寒熱發作有時得汗解而復作因於暑者必用香薷其久瘧涉虛須用何人飲者不在此例柴胡羌活防風半夏黃芩厚朴枳殼制香附蘇梗炙草寒多加桂枝搜根鬚用檳榔痢此證以裡急後重得除為驗涉暑亦須香薷其五更泄瀉須用四神丸者與此相反並忌桂枝厚朴檳榔枳實神麯楂炭黃連木香赤芍丹皮黑山梔赤苓澤瀉甚者須用大黃淋濁由心經蘊熱及濕熱下注者多其虛勞失精之宜補澀者不在此例自遺夢遺亦有不盡屬虛者瞿麥扁蓄黃柏川楝子海金沙豬苓赤苓澤瀉滑石莖中痛加甘草梢甚者須青麟丸失血血證多矣初起必有所因凡理氣達郁清熱降火之法俱不可廢不即是虛勞也赤芍丹皮當歸身延胡索川鬱金臺烏藥黃芩黑山桅有瘀加參三七火熱甚用犀角地黃湯腰痛此證諸經皆有之而在太陽者最輕經云腰為腎府轉搖不能腎將憊矣者不在此例獨活防風青皮枳殼蘇梗烏藥延胡索白朮赤芍茯苓炙草連脅痛加柴胡兼脹加木香耳聾此證每屬少陽而瘧後尤多其為腎虛之宜磁朱丸者不在此例耳鳴亦然柴胡川芎黃芩赤芍半夏陳皮厚朴枳殼竹茹茯苓炙草風熱加牛蒡濕熱加蒼朮陽為陰遏此證陽氣為陰寒所抑非陽之虛乃陽之郁也故貴升陽散火以達火鬱與宜補之陽相反升麻柴胡羌活獨活黃芩半夏陳皮青皮白朮白茯苓生炙甘草涉虛者補中益氣湯肝陽不升木火宜升暢遂條達則無病俗有所謂肝陽升者其實肝鬱不伸也故宜暢達柴胡當歸身赤芍川芎香附木香鬱金丹皮川楝子有火者加羚羊角達郁用越鞠逍遙丸女科調經經阻之甚者須用桃仁紅花其作痛經者須蒲黃靈脂有帶宜先治帶川芎柴胡當歸身尾赤白芍丹皮香附延胡索石決明鬱金澤蘭葉寒加炮薑炭止帶止者以通為止也甚者須蒼朮厚朴有寒宜炮薑附子並須茵陳此證寒濕濕熱皆有之茵陳蒿黃柏黑山梔赤芍丹皮牛膝車前豬苓茯苓澤瀉或加二三妙丸胎前芩術為安胎聖藥凡疰夏諸方皆可移治惡阻其保產無憂散亦必用之藥不見虛證切忌滋補黃芩白朮砂仁蘇梗當歸身赤白芍丹皮炙草氣滯之甚少加羌活厚朴枳殼產後臨產不外開骨散產後不外生化湯皆主佛手散一法並須連服方效若見他病須照病治川芎當歸身炮薑炭單桃仁炙草瘀阻加蒲黃延胡索甚者加五靈脂兒科兒病都從食上起故以消導為主凡急驚用清法慢驚用溫法並忌冰麝蛇蠍珠黃金石及滋補藥建神麯焦谷麥芽半夏陳皮藿木香枳殼山藥炙草和中加薑棗熱加黃連寒加乾薑有蟲加使君子木榧子從來選方成書者大都在已成名醫之後不勘輕淺之病故凡有病即治不使病大之方皆不傳於世此頗不利於初病且無益於初學亦以病家未及大病凡所服方病愈而即棄之絕不知病之得此方而始不大故惟此不使病大之方更不傳於世也孫蘊苓中瀚謂常見有病之家必俟病大而後問藥然病之既大即難保其必愈固不若治之於早不使病大之為得矣今夏在都會檢此冊一二方用之無不應手而愈以是信其能不使病大也將出都就聚珍版印千帙攜歸里門茲復有所補綴並刪改原文處非孫君於排印時有增損也癸未冬月九芝並識是冊錄成客多以不載分兩為嫌無已約略言之凡方中荊防陳半之屬通用錢半不注外其他可用三錢者如蘇葉連翹山梔神麯楂炭茯苓豬苓澤瀉淡豆豉杏仁薏仁川楝子車前子扁豆衣木瓜貝母海蛤殼海浮石香附大黃海金沙滑石歸身延胡索石決明桃仁山藥使君子木榧子六一散青麟丸越鞠丸逍遙丸二妙丸三妙丸然錢半之藥亦有時用至三錢退至一錢者三錢之藥亦有可用至五錢一兩者其他用三五七分多至錢許如甘草薄荷葶藶黃連柴胡川芎香薷青黛馬勃砂仁豆蔻乾薑附子丁香吳茱萸草果仁益智仁升麻殭蠶蟬蛻桂枝參三七犀角紅花炮薑炭然錢許之藥用以為君亦有升至錢半者此外如生薑一片蔥白頭二個雞內金一具竹瀝一杯黑棗二枚則大小且無定矣總之醫家用藥隨證重輕臨時酌量豈有一定如上云云不過使病家略有端倪耳
